<div class="forgot-container">
  <h2>Forgot Password</h2>

  <div *ngIf="!otpSent">
    <input type="email" [(ngModel)]="email" placeholder="Enter your registered email" required>
    <button (click)="sendOtp()">Send OTP</button>
    <p class="error">{{ errorMessage }}</p>
  </div>

  <div *ngIf="otpSent">
    <input type="text" [(ngModel)]="enteredOtp" placeholder="Enter OTP" maxlength="6">
    <button (click)="verifyOtp()">Verify OTP</button>
    <p class="success">{{ successMessage }}</p>
    <p class="error">{{ errorMessage }}</p>

    <div *ngIf="successMessage">
      <input type="password" [(ngModel)]="newPassword" placeholder="Enter new password">
      <button (click)="changePassword()">Change Password</button>
    </div>
  </div>
</div>
